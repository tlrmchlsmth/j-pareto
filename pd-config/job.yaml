apiVersion: batch/v1
kind: Job
metadata:
  name: ${JOB_NAME}
  labels:
    app: pd-config-bench
    pd-config/workload: ${WORKLOAD_TYPE}
    pd-config/tp: "${TP}"
spec:
  backoffLimit: 100
  podFailurePolicy:
    rules:
      - action: Ignore
        onPodConditions:
          - type: DisruptionTarget
      - action: FailJob
        onExitCodes:
          containerName: bench
          operator: NotIn
          values: [0]
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app: pd-config-bench
        pd-config/workload: ${WORKLOAD_TYPE}
        pd-config/tp: "${TP}"
      annotations:
        k8s.v1.cni.cncf.io/networks: |-
          ${MULTUS_NETWORKS}
    spec:
      tolerations:
        - key: "amd.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "nvidia.com/sriov-rdma-vf"
          operator: "Exists"
          effect: "NoSchedule"
      priorityClassName: ${PRIORITY_CLASS}
      restartPolicy: Never
      initContainers: 
        - name: qos-downgrade
          image: ${VLLM_IMAGE}
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "-c", "exit 0"]
          resources: {}
      containers:
        - name: bench
          image: ${VLLM_IMAGE}
          imagePullPolicy: Always
          securityContext:
            capabilities:
              add:
                - IPC_LOCK
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail

              echo "PD_CONFIG_START"
              echo "CONFIG: model=${MODEL} tp=${TP} dp=${DP} gpu_count=${GPU_COUNT} ep=${ENABLE_EP} workload=${WORKLOAD_TYPE} isl=${ISL} osl=${OSL}"
              echo "TARGET_DURATION: ${TARGET_DURATION}s  MIN_PROMPTS: ${MIN_PROMPTS}"
              echo "CONCURRENCY_LEVELS: ${CONCURRENCY_LEVELS}"

              # Configure decode specialization: DecodeBenchConnector fills KV cache
              # with dummy values so decode runs against a realistic ISL without
              # actually computing the prefill.
              KV_ARGS=""
              if [ "${WORKLOAD_TYPE}" = "decode" ]; then
                KV_ARGS='--kv-transfer-config {"kv_connector":"DecodeBenchConnector","kv_role":"kv_both"}'
              fi

              # Expert parallelism flag
              EP_ARGS=""
              if [ "${ENABLE_EP}" = "true" ]; then
                EP_ARGS="--enable-expert-parallel"
              fi

              # Start vLLM server in the background
              vllm serve ${MODEL} \
                --port 8000 \
                --load-format=dummy \
                --tensor-parallel-size ${TP} \
                --data-parallel-size ${DP} \
                --gpu-memory-utilization ${GPU_MEM_UTIL} \
                --disable-uvicorn-access-log \
                $KV_ARGS $EP_ARGS ${EXTRA_VLLM_ARGS} \
                2>&1 &
              VLLM_PID=$!

              # Wait for vLLM to be healthy (up to 30 minutes)
              echo "Waiting for vLLM server to start..."
              MAX_WAIT=1800
              ELAPSED=0
              while ! curl -s http://localhost:8000/health > /dev/null 2>&1; do
                if ! kill -0 $VLLM_PID 2>/dev/null; then
                  echo "ERROR: vLLM process died during startup"
                  exit 1
                fi
                sleep 5
                ELAPSED=$((ELAPSED + 5))
                if [ $ELAPSED -ge $MAX_WAIT ]; then
                  echo "ERROR: vLLM failed to start within ${MAX_WAIT}s"
                  kill $VLLM_PID 2>/dev/null || true
                  exit 1
                fi
                if [ $((ELAPSED % 60)) -eq 0 ]; then
                  echo "  waiting... ${ELAPSED}s"
                fi
              done
              echo "vLLM server ready after ${ELAPSED}s"

              # Extend decode concurrency range for higher GPU counts (more GPUs handle more users)
              # Keeps base range for comparison, adds higher levels up to max_base * GPU_COUNT.
              # Note: use BENCH_CONCURRENCIES (not ${CONCURRENCY_LEVELS}) for the loop
              # because envsubst replaces all ${CONCURRENCY_LEVELS} at template time.
              BENCH_CONCURRENCIES="${CONCURRENCY_LEVELS}"
              SCALE_FACTOR=${GPU_COUNT}
              if [ "${WORKLOAD_TYPE}" = "decode" ] && [ $SCALE_FACTOR -gt 1 ]; then
                MAX_C=$(echo ${CONCURRENCY_LEVELS} | tr ' ' '\n' | sort -n | tail -1)
                EXTRA=$((MAX_C * 2))
                while [ $EXTRA -le $((MAX_C * SCALE_FACTOR)) ]; do
                  BENCH_CONCURRENCIES="$BENCH_CONCURRENCIES $EXTRA"
                  EXTRA=$((EXTRA * 2))
                done
                echo "EXTENDED_CONCURRENCIES: $BENCH_CONCURRENCIES (base + extended for ${GPU_COUNT} GPUs)"
              fi

              # Run benchmarks at each concurrency level
              for MC in $BENCH_CONCURRENCIES; do
                echo ""

                CALIB_N=$((MC > 20 ? MC : 20))
                echo "CALIBRATION: concurrency=$MC num_prompts=$CALIB_N"
                CALIB_OUTPUT=$(vllm bench serve \
                  --base-url http://localhost:8000 \
                  --model ${MODEL} \
                  --dataset-name random \
                  --random-input-len ${ISL} \
                  --random-output-len ${OSL} \
                  --max-concurrency $MC \
                  --num-prompts $CALIB_N \
                  --ignore-eos \
                  --seed $(date +%M%H%M%S) 2>&1)
                echo "$CALIB_OUTPUT"

                if [ "${WORKLOAD_TYPE}" = "decode" ]; then
                  THROUGHPUT=$(echo "$CALIB_OUTPUT" | grep -i "Output token throughput" | grep -oE '[0-9]+\.[0-9]+' | tail -1)
                  TOKENS_PER_REQ=${OSL}
                else
                  THROUGHPUT=$(echo "$CALIB_OUTPUT" | grep -i "Total Token throughput" | grep -oE '[0-9]+\.[0-9]+' | tail -1)
                  TOKENS_PER_REQ=$((${ISL} + ${OSL}))
                fi
                if [ -n "${THROUGHPUT:-}" ]; then
                  NP=$(python3 -c "import math; r=float('$THROUGHPUT')/$TOKENS_PER_REQ; print(max(${MIN_PROMPTS}, math.ceil(r * ${TARGET_DURATION})))")
                else
                  NP=${MIN_PROMPTS}
                fi
                echo "COMPUTED_NUM_PROMPTS: $NP (throughput=${THROUGHPUT:-n/a} tok/s)"

                echo "BENCH_RUN: concurrency=$MC tp=${TP} dp=${DP} workload=${WORKLOAD_TYPE} num_prompts=$NP"
                vllm bench serve \
                  --base-url http://localhost:8000 \
                  --model ${MODEL} \
                  --dataset-name random \
                  --random-input-len ${ISL} \
                  --random-output-len ${OSL} \
                  --max-concurrency $MC \
                  --num-prompts $NP \
                  --ignore-eos \
                  --seed $(date +%M%H%M%S)
                echo "BENCH_RUN_END: concurrency=$MC"
              done

              echo ""
              echo "PD_CONFIG_END"

              # Cleanup vLLM server
              kill $VLLM_PID 2>/dev/null || true
              wait $VLLM_PID 2>/dev/null || true

          resources:
            limits:
              amd.com/gpu: "${GPU_COUNT}"
              cpu: "32"
              memory: 100Gi
              nvidia.com/sriov-rdma-vf: "${GPU_COUNT}"
            requests:
              amd.com/gpu: "${GPU_COUNT}"
              cpu: "32"
              memory: 100Gi
              nvidia.com/sriov-rdma-vf: "${GPU_COUNT}"
          env:
            - name: VLLM_MOE_ROUTING_SIMULATION_STRATEGY
              value: "uniform_random"
            - name: UCX_TLS
              value: "self,sm,rocm,rc"
            - name: UCX_IB_GID_INDEX
              value: "3"
            - name: UCX_IB_TRAFFIC_CLASS
              value: "41"
            - name: UCX_MAX_RMA_RAILS
              value: "1"
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-secret
                  key: HF_TOKEN
                  optional: true
            - name: VLLM_LOGGING_LEVEL
              value: INFO
            - name: VLLM_ROCM_USE_AITER
              value: "${VLLM_ROCM_USE_AITER}"
            - name: AITER_JIT_DIR
              value: "/aiter-cache"
            # Aiter compilation env vars
            - name: PYTORCH_ROCM_ARCH
              value: "gfx942"
            - name: GPU_ARCHS
              value: "gfx942"
            - name: MAX_JOBS
              value: "64"
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-secret
                  key: HF_TOKEN
                  optional: true
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
            - name: torch-compile-cache
              mountPath: /.cache
            - name: hf-cache
              mountPath: /root/.cache/huggingface
            - name: aiter-cache
              mountPath: /aiter-cache
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 20Gi
        - name: torch-compile-cache
          emptyDir: {}
        - name: hf-cache
          hostPath:
            path: ${HF_CACHE_HOST_PATH}
            type: DirectoryOrCreate
        - name: aiter-cache
          hostPath:
            path: /mnt/nvme/cache
            type: DirectoryOrCreate
