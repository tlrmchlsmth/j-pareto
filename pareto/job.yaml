apiVersion: batch/v1
kind: Job
metadata:
  name: ${JOB_NAME}
  labels:
    app: pareto
    pareto/config: ${CONFIG_NAME}
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app: pareto
        pareto/config: ${CONFIG_NAME}
    spec:
      serviceAccountName: poker
      restartPolicy: Never
      tolerations:
        - key: "amd.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
      containers:
        - name: bench
          image: ${POKER_IMAGE}
          imagePullPolicy: Always
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail

              # Activate venv and install vllm benchmark client
              source /app/.venv/bin/activate
              echo "Installing vllm..."
              uv pip install vllm

              # CONFIG_NAME is the human-readable config identifier (e.g. agg-tp8)
              # TARGET is the llm-d guide name (agg or disagg) used for
              # gateway URL construction and GPU detection via pod labels.
              CONFIG_NAME="${CONFIG_NAME}"
              TARGET="${TARGET}"
              NAMESPACE="${NAMESPACE}"
              ISL=${ISL}
              OSL=${OSL}
              CONCURRENCY_LEVELS="${CONCURRENCY_LEVELS}"
              TARGET_DURATION=${TARGET_DURATION}
              MIN_PROMPTS=${MIN_PROMPTS}

              # Build gateway URL
              URL="http://infra-${TARGET}-inference-gateway-istio.${NAMESPACE}.svc.cluster.local"

              # Detect model
              echo "Detecting model from $CONFIG_NAME (guide=$TARGET)..."
              MAX_WAIT=300
              ELAPSED=0
              MODEL=""
              while [ -z "$MODEL" ] || [ "$MODEL" = "null" ]; do
                RESP=$(curl -s "$URL/v1/models" 2>/dev/null || true)
                MODEL=$(echo "$RESP" | jq -r '.data[0].id' 2>/dev/null || true)
                if [ -n "$MODEL" ] && [ "$MODEL" != "null" ]; then
                  break
                fi
                sleep 5
                ELAPSED=$((ELAPSED + 5))
                if [ $ELAPSED -ge $MAX_WAIT ]; then
                  echo "ERROR: Could not detect model from $CONFIG_NAME after ${MAX_WAIT}s"
                  exit 1
                fi
                if [ $((ELAPSED % 30)) -eq 0 ]; then
                  echo "  waiting for gateway... ${ELAPSED}s"
                fi
              done
              echo "Model: $MODEL"

              # Detect GPU count
              GPU_COUNT=$(kubectl get pods -n "$NAMESPACE" \
                -l "llm-d.ai/guide=${TARGET},llm-d.ai/inference-serving=true" \
                -o json | jq '[.items[].spec.containers[].resources.limits | (.["nvidia.com/gpu"] // .["amd.com/gpu"] // empty) | tonumber] | add')
              if [ -z "$GPU_COUNT" ] || [ "$GPU_COUNT" = "null" ]; then
                echo "WARNING: Could not detect GPU count for $CONFIG_NAME, defaulting to 0"
                GPU_COUNT=0
              fi
              echo "GPU count: $GPU_COUNT"

              echo "SWEEP_START"
              echo "CONFIG: target=$CONFIG_NAME model=$MODEL isl=$ISL osl=$OSL gpu_count=$GPU_COUNT"

              if [ "$SWEEP_TYPE" = "eval" ]; then

                # Check if the model name contains "gpt-oss"
                if [[ "$MODEL" == *"gpt-oss"* ]]; then
                  echo "Detected gpt-oss model. Running gpt-oss specific evals..."

                  # Clone the repo if it hasn't been cloned yet
                  if [ ! -d "gpt-oss" ]; then
                    git clone https://github.com/openai/gpt-oss.git
                  fi

                  cd gpt-oss

                  # Optional: If the gpt-oss repo requires its own dependencies to be installed
                  # uv pip install -r requirements.txt 
                  uv pip install blobfile

                  echo "EVAL_START"
                  echo "CONFIG: target=$CONFIG_NAME model=$MODEL gpu_count=$GPU_COUNT"

                  # Run the eval against your existing gateway URL
                  OPENAI_API_KEY=empty python -m gpt_oss.evals \
                    --model "$MODEL" \
                    --eval gpqa \
                    --n-threads 512 \
                    --reasoning-effort low \
                    --base-url "$URL/v1" \
                    --sampler chat_completions

                  echo "EVAL_END"

                  # Return to previous directory
                  cd ..
                  
                else

                  uv pip install lm-eval[vllm]
                  uv pip install lm-eval[api]
                  uv pip show lm_eval

                  echo "EVAL_START"
                  echo "CONFIG: target=$CONFIG_NAME model=$MODEL gpu_count=$GPU_COUNT"

                  # Run lm_eval against the vLLM OpenAI-compatible endpoint
                  lm_eval \
                    --model local-completions \
                    --model_args base_url="$URL/v1/completions",model="$MODEL",tokenized_requests=False,num_concurrent=512,trust_remote_code=True \
                    --tasks gsm8k \
                    --seed 0 \
                    --gen_kwargs temperature=0.0

                  echo "EVAL_END"
                fi

              else

                echo "TARGET_DURATION: ${TARGET_DURATION}s  MIN_PROMPTS: ${MIN_PROMPTS}"
                echo "CONCURRENCY_LEVELS: $CONCURRENCY_LEVELS"
                for MC in $CONCURRENCY_LEVELS; do
                  echo ""

                  # Check if MC is high enough to skip calibration
                  if [ "$MC" -gt 100 ]; then
                      # For high MC the system is generally faster. it is not worth it to run
                      # a calibration run.
                      echo "SKIPPING CALIBRATION: MC=$MC is > 100"
                      NP=$MC
                      THROUGHPUT="skipped"
                  else
                    # Calibration: small run to estimate throughput
                    CALIB_N=$((MC > 20 ? MC : 20))
                    echo "CALIBRATION: concurrency=$MC num_prompts=$CALIB_N"
                    CALIB_OUTPUT=$(vllm bench serve \
                      --base-url "$URL" \
                      --model "$MODEL" \
                      --dataset-name random \
                      --random-input-len $ISL \
                      --random-output-len $OSL \
                      --max-concurrency $MC \
                      --num-prompts $CALIB_N \
                      --ignore-eos \
                      --request-rate 4096 \
                      --seed $(date +%M%H%M%S) 2>&1)
                    echo "$CALIB_OUTPUT"

                    # Compute num_prompts for target duration
                    THROUGHPUT=$(echo "$CALIB_OUTPUT" | grep -i "Total Token throughput" | grep -oE '[0-9]+\.[0-9]+' | tail -1)
                    TOKENS_PER_REQ=$((ISL + OSL))
                    if [ -n "${THROUGHPUT:-}" ]; then
                      NP=$(python3 -c "import math; r=float('$THROUGHPUT')/$TOKENS_PER_REQ; print(max($MIN_PROMPTS, math.ceil(r * $TARGET_DURATION)))")
                    else
                      NP=$MIN_PROMPTS
                    fi
                    # Just make sure that we execute atleast MC requests !
                    NP=$(( $NP > $MC ? $NP : $MC ))
                  fi

                  echo "COMPUTED_NUM_PROMPTS: $NP (throughput=${THROUGHPUT:-n/a} tok/s)"

                  # Main benchmark run
                  echo "BENCH_RUN: concurrency=$MC num_prompts=$NP"
                  vllm bench serve \
                    --base-url "$URL" \
                    --model "$MODEL" \
                    --dataset-name random \
                    --random-input-len $ISL \
                    --random-output-len $OSL \
                    --max-concurrency $MC \
                    --num-prompts $NP \
                    --ignore-eos \
                    --request-rate 4096 \
                    --seed $(date +%M%H%M%S)
                  echo "BENCH_RUN_END: concurrency=$MC"
                done
              fi

              echo ""
              echo "SWEEP_END"
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-secret
                  key: HF_TOKEN
                  optional: true
          resources:
            requests:
              cpu: "2"
              memory: 4Gi
            limits:
              cpu: "4"
              memory: 8Gi
