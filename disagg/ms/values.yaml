multinode: false

modelArtifacts:
  # uri and name are set via MODEL env var in Justfile -> helmfile
  size: 150Gi
  authSecretName: "hf-secret"
  labels:
    llm-d.ai/inference-serving: "true"
    llm-d.ai/guide: "disagg"
    llm-d.ai/accelerator-variant: "gpu"
    llm-d.ai/accelerator-vendor: "amd"

routing:
  servicePort: 8000
  proxy:
    image: ghcr.io/llm-d/llm-d-routing-sidecar:v0.5.0
    connector: nixlv2
    secure: false

accelerator:
  type: amd

decode:
  parallelism:
    tensor: 2
  create: true
  replicas: 1
  # podAnnotations (k8s.v1.cni.cncf.io/networks) and nvidia.com/sriov-rdma-vf resources
  # are injected dynamically by helmfile from DECODE_TP/PREFILL_TP env
  extraConfig:
    hostNetwork: false
  monitoring:
    podmonitor:
      enabled: true
      portName: "vllm"
      path: "/metrics"
      interval: "30s"
  initContainers: 
    - name: qos-downgrade
      image: "quay.io/tms/poker:0.0.13" # dummy
      imagePullPolicy: IfNotPresent
      command: ["/bin/bash", "-c", "exit 0"]
      resources: {}
  containers:
    - name: "vllm"
      image: ghcr.io/vcave/llm-d/llm-d-rocm:v0.4.7-debug
      securityContext:
        capabilities:
          add:
            - IPC_LOCK
      modelCommand: vllmServe
      args:
        - "--kv-transfer-config"
        - '{"kv_connector":"NixlConnector",
            "kv_role":"kv_both",
            "kv_load_failure_policy":"fail"}'
        - "--disable-uvicorn-access-log"
        - "--gpu-memory-utilization"
        - "0.95"
      env:
        - name: UCX_TLS
          value: "self,sm,rocm,rc"
        - name: UCX_IB_GID_INDEX
          value: "3"
        - name: UCX_IB_TRAFFIC_CLASS
          value: "41"
        - name: UCX_MAX_RMA_RAILS
          value: "1"
        - name: VLLM_NIXL_SIDE_CHANNEL_HOST
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: HF_HOME
          value: "/model-cache"
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-secret
              key: HF_TOKEN
              optional: true
        - name: AITER_JIT_DIR
          value: "/aiter-cache"
        # Aiter compilation env vars
        - name: PYTORCH_ROCM_ARCH
          value: "gfx942"
        - name: GPU_ARCHS
          value: "gfx942"
        - name: MAX_JOBS
          value: "64"
      ports:
        - containerPort: 8200
          name: vllm
          protocol: TCP
        - containerPort: 5600
          name: nixl
          protocol: TCP
      resources:
        limits:
          memory: 400Gi
          cpu: "32"
        requests:
          memory: 400Gi
          cpu: "32"
      mountModelVolume: false
      volumeMounts:
        - name: metrics-volume
          mountPath: /.config
        - name: shm
          mountPath: /dev/shm
        - name: torch-compile-cache
          mountPath: /.cache
        - name: hf-cache
          mountPath: /model-cache
        - name: aiter-cache
          mountPath: /aiter-cache
      startupProbe:
        httpGet:
          path: /v1/models
          port: vllm
        initialDelaySeconds: 15
        periodSeconds: 30
        timeoutSeconds: 5
        failureThreshold: 60
      livenessProbe:
        httpGet:
          path: /health
          port: vllm
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 30
      readinessProbe:
        httpGet:
          path: /v1/models
          port: vllm
        periodSeconds: 5
        timeoutSeconds: 2
        failureThreshold: 3
  volumes:
    - name: metrics-volume
      emptyDir: {}
    - name: shm
      emptyDir:
        medium: Memory
        sizeLimit: "20Gi"
    - name: torch-compile-cache
      emptyDir: {}
    - name: hf-cache
      hostPath:
        path: /mnt/nvme/models
        type: DirectoryOrCreate
    - name: aiter-cache
      hostPath:
        path: /mnt/nvme/cache
        type: DirectoryOrCreate

prefill:
  parallelism:
    tensor: 1
  create: true
  replicas: 1
